<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yamzz Market • Admin Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:
linear-gradient(
135deg,
#040b17,
#081a3b,
#0d2858
);

position:relative;

}

body::before{

content:"";

position:absolute;

width:450px;
height:450px;

background:#37c8ff40;

border-radius:50%;

top:-150px;
right:-150px;

filter:blur(120px);

}

body::after{

content:"";

position:absolute;

width:350px;
height:350px;

background:#006dff30;

border-radius:50%;

bottom:-120px;
left:-120px;

filter:blur(120px);

}

.login-box{

position:relative;

z-index:5;

width:100%;
max-width:430px;

padding:40px;

border-radius:28px;

background:
rgba(8,23,58,.88);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 30px 80px rgba(0,0,0,.45),
0 0 40px rgba(76,201,255,.15);

animation:popup .5s ease;

}

@keyframes popup{

from{

opacity:0;
transform:translateY(30px) scale(.95);

}

to{

opacity:1;
transform:translateY(0) scale(1);

}

}

.logo{

display:flex;
flex-direction:column;
align-items:center;

margin-bottom:30px;

}

.logo-icon{

width:90px;
height:90px;

border-radius:24px;

display:flex;
justify-content:center;
align-items:center;

background:

linear-gradient(
135deg,
#45c9ff,
#79e1ff
);

font-size:38px;

color:#00111e;

box-shadow:

0 0 35px
rgba(69,201,255,.45);

margin-bottom:18px;

}

.logo h2{

font-size:32px;

font-weight:800;

color:white;

}

.logo p{

margin-top:6px;

color:#9fb8e5;

font-size:15px;

}

.error{

display:none;

margin-bottom:18px;

padding:14px;

border-radius:15px;

background:#ff3b3b22;

border:1px solid #ff5b5b55;

color:#ff9b9b;

font-size:14px;

text-align:center;

}

.input-group{

position:relative;

margin-bottom:18px;

}

.input-group i{

position:absolute;

left:18px;

top:50%;

transform:translateY(-50%);

color:#48c8ff;

font-size:18px;

}

.input{

width:100%;

height:58px;

padding-left:50px;
padding-right:50px;

border:none;

outline:none;

border-radius:16px;

background:#102347;

color:white;

font-size:15px;

transition:.25s;

}

.input:focus{

background:#17315d;

box-shadow:

0 0 0 2px #4cc9ff55;

}

.toggle-password{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

color:#8fb8ff;

}

.login-btn{

width:100%;

height:58px;

border:none;

border-radius:16px;

margin-top:8px;

font-size:16px;

font-weight:700;

cursor:pointer;

background:

linear-gradient(
135deg,
#3fc9ff,
#67dcff
);

color:#001421;

transition:.25s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:

0 15px 35px rgba(76,201,255,.35);

}

.footer{

margin-top:24px;

text-align:center;

font-size:13px;

color:#7f97bf;

}

.loading{

display:none;

margin-top:18px;

text-align:center;

color:#8eb8ff;

}

.spinner{

width:40px;
height:40px;

margin:auto;

border-radius:50%;

border:4px solid rgba(255,255,255,.15);

border-top:4px solid #48c8ff;

animation:spin .8s linear infinite;

margin-bottom:10px;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

@media(max-width:500px){

.login-box{

margin:20px;

padding:30px;

}

.logo-icon{

width:75px;
height:75px;

font-size:30px;

}

.logo h2{

font-size:28px;

}

}

.remember-row{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:18px;

margin-bottom:10px;

}

.remember{

display:flex;

align-items:center;

gap:8px;

color:#9fb8e5;

font-size:14px;

cursor:pointer;

}

.remember input{

accent-color:#4cc9ff;

width:17px;

height:17px;

}

.forgot{

color:#4cc9ff;

font-size:14px;

text-decoration:none;

transition:.25s;

}

.forgot:hover{

opacity:.8;

}

.login-box{

animation:floatCard 4s ease-in-out infinite;

}

@keyframes floatCard{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-6px);

}

}

.logo-icon{

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{

box-shadow:0 0 15px #4cc9ff55;

}

to{

box-shadow:

0 0 35px #4cc9ff,

0 0 60px #4cc9ff55;

}

}

.login-btn:active{

transform:scale(.97);

}

.input::placeholder{

color:#7da0d7;

}
</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<div class="logo-icon">
<i class="fa-solid fa-store"></i>
</div>

<h2>Yamzz Market</h2>

<p>Secure Admin Dashboard</p>

</div>

<div class="error" id="errorBox">

Username atau Password salah

</div>

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input
id="username"
class="input"
type="text"
placeholder="Username">

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
id="password"
class="input"
type="password"
placeholder="Password">

<i
class="fa-solid fa-eye toggle-password"
id="togglePassword"></i>

</div>

<button
class="login-btn"
onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

<div class="remember-row">

<label class="remember">

<input type="checkbox" id="remember">

<span>Remember Me</span>

</label>

<a href="#" class="forgot" onclick="forgotPassword()">
Lupa Password?
</a>

</a>

</div>

<div
class="loading"
id="loading">

<div class="spinner"></div>

Memverifikasi akun...

</div>

<div class="footer">

© 2026 Yamzz Market

</div>

</div>

<script src="js/jsonbin.js"></script>

<script>

const password =
document.getElementById("password");

const toggle =
document.getElementById("togglePassword");

toggle.onclick = () => {

if(password.type === "password"){

password.type = "text";

toggle.classList.remove("fa-eye");
toggle.classList.add("fa-eye-slash");

}else{

password.type = "password";

toggle.classList.remove("fa-eye-slash");
toggle.classList.add("fa-eye");

}

};

  function forgotPassword(){

    alert(
        "Silakan hubungi Owner untuk melakukan reset password."
    );

  }
  
function showError(text){

const box =
document.getElementById("errorBox");

box.innerText = text;

box.style.display = "block";

box.animate([

{
opacity:0,
transform:"translateY(-10px)"
},

{
opacity:1,
transform:"translateY(0)"
}

],{

duration:250

});

}

function hideError(){

document.getElementById(
"errorBox"
).style.display = "none";

}

const loginBtn =
document.querySelector(".login-btn");

loginBtn.addEventListener("mousemove",(e)=>{

const x =
e.offsetX;

const y =
e.offsetY;

loginBtn.style.background=

`radial-gradient(circle at ${x}px ${y}px,#8be8ff,#4cc9ff)`;

});

loginBtn.addEventListener("mouseleave",()=>{

loginBtn.style.background=

"linear-gradient(135deg,#3fc9ff,#67dcff)";

});

async function login(){

hideError();

const btn =
document.querySelector(".login-btn");

const loading =
document.getElementById("loading");

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value;

if(username===""){

showError("Username wajib diisi.");

return;

}

if(password===""){

showError("Password wajib diisi.");

return;

}

btn.disabled = true;

btn.style.opacity=".7";

loading.style.display="block";

try{

const data =
await getData();

if(!data){

throw new Error();

}

if(

username === data.settings.admin.username &&

password === data.settings.admin.password

){

localStorage.setItem(
"yamzz_admin",
"true"
);

btn.innerHTML =
'<i class="fa-solid fa-circle-check"></i> Berhasil';

setTimeout(()=>{

window.location.href =
"admin.html";

},800);

}else{

showError(
"Username atau Password salah."
);

btn.disabled=false;

btn.style.opacity="1";

loading.style.display="none";

}

}catch(e){

showError(
"Gagal mengambil data server."
);

btn.disabled=false;

btn.style.opacity="1";

loading.style.display="none";

}

}

document.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

login();

}

});

if(localStorage.getItem("yamzz_admin")){

window.location.href="admin.html";

}

</script>

</body>
</html>
