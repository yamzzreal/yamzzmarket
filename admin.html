<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Yamzz Market</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#061226;
}

.admin-container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.admin-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:25px;

}

.admin-title{

    font-size:35px;
    font-weight:800;

}

.admin-card{

    background:
    linear-gradient(
    180deg,
    #08173a,
    #06102a
    );

    border-radius:25px;

    padding:25px;

    margin-bottom:25px;

    border:1px solid
    rgba(255,255,255,.08);

}

.input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:#102347;

    color:white;

    outline:none;

}

.label{

    display:block;

    margin-bottom:10px;

    font-weight:600;

}

.save-btn{

    width:100%;

    border:none;

    padding:15px;

    border-radius:15px;

    background:#4cc9ff;

    color:#001321;

    font-weight:700;

    cursor:pointer;

}

.product-list{

    margin-top:20px;

}

.product-item{

    display:flex;

    gap:20px;

    align-items:center;

    background:#102347;

    padding:15px;

    border-radius:20px;

    margin-bottom:15px;

}

.product-thumb{

    width:90px;
    height:90px;

    border-radius:15px;

    overflow:hidden;

    flex-shrink:0;

}

.product-thumb img{

    width:100%;
    height:100%;

    object-fit:cover;

}

.product-info{

    flex:1;

}

.product-info h3{

    margin-bottom:5px;

}

.product-price{

    color:#ff5ab3;

    font-size:20px;

    font-weight:700;

}

.actions{

    display:flex;
    gap:10px;

}

.edit-btn{

    border:none;

    padding:12px 15px;

    border-radius:12px;

    background:#4cc9ff;

    font-weight:700;

    cursor:pointer;

}

.delete-btn{

    border:none;

    padding:12px 15px;

    border-radius:12px;

    background:#ff5a5a;

    color:white;

    font-weight:700;

    cursor:pointer;

}

.logout-btn{

    border:none;

    padding:12px 20px;

    border-radius:15px;

    background:#ff5ab3;

    color:white;

    cursor:pointer;

}

.loading-card{

    height:100px;

    border-radius:20px;

    margin-bottom:15px;

    background:
    linear-gradient(
    90deg,
    #102347 25%,
    #18356f 50%,
    #102347 75%
    );

    background-size:200% 100%;

    animation:skeleton 1.2s infinite;

}

@keyframes skeleton{

0%{
background-position:200% 0;
}

100%{
background-position:-200% 0;
}

}

</style>

</head>
<body>

<div class="admin-container">

<div class="admin-header">

<h1 class="admin-title">
Yamzz Market Admin
</h1>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- Pengaturan Website -->

<div class="admin-card">

<h2>Pengaturan Website</h2>

<br>

<label class="label">
Nama Website
</label>

<input
type="text"
id="siteName"
class="input">

<br><br>

<label class="label">
WhatsApp Admin
</label>

<input
type="text"
id="siteWa"
class="input">

<br><br>

<label class="label">
Link Grup
</label>

<input
type="text"
id="groupLink"
class="input">

<br><br>

<button
class="save-btn"
onclick="saveSettings()">

Simpan Pengaturan

</button>

</div>

<!-- Tambah Produk -->

<div class="admin-card">

<h2>Tambah Produk</h2>

<br>

<input
type="text"
id="title"
class="input"
placeholder="Nama Produk">

<br><br>

<textarea
id="description"
class="input"
rows="4"
placeholder="Deskripsi Produk"></textarea>

<br><br>

<input
type="number"
id="price"
class="input"
placeholder="Harga">

<br><br>

<input
type="text"
id="image"
class="input"
placeholder="URL Gambar">

<br><br>

<input
type="number"
id="whatsapp"
class="input"
placeholder="Nomor WhatsApp">

<br><br>

<button
class="save-btn"
onclick="addProduct()">

Tambah Produk

</button>

</div>

<!-- Daftar Produk -->

<div class="admin-card">

<h2>Daftar Produk</h2>

<div
id="productList"
class="product-list">

<div class="loading-card"></div>
<div class="loading-card"></div>
<div class="loading-card"></div>

</div>

</div>

</div>
<div id="editModal">

  <div class="modal-box">

    <h3 style="margin:0 0 15px 0; display:flex; align-items:center; gap:8px;">
  <i class="fa-solid fa-pen-to-square" style="color:#00e5ff;"></i>
  Edit Produk
</h3>

<input id="editTitle" placeholder="Nama Produk"
style="width:100%; margin-bottom:10px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<input id="editDesc" placeholder="Deskripsi"
style="width:100%; margin-bottom:10px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<input type="number" id="editPrice" placeholder="Harga"
style="width:100%; margin-bottom:10px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<input id="editImage" placeholder="URL Gambar"
style="width:100%; margin-bottom:12px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<button onclick="saveEdit()"
style="
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ff99,#00e5ff);
color:#000;
font-weight:bold;
cursor:pointer;
margin-bottom:8px;
box-shadow:0 0 10px rgba(0,255,200,0.3);
">
Simpan Perubahan
</button>

<button onclick="closeModal()"
style="
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff3b3b;
color:#fff;
font-weight:bold;
cursor:pointer;
">
Batal
</button>

  </div>

</div>
<script src="js/jsonbin.js"></script>
<script src="js/admin.js"></script>

</body>
    </html>
