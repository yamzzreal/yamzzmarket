<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Yamzz Market</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<style>
html{
    scroll-behavior:smooth;
}

*{
    box-sizing:border-box;
}
body{
    background:#061226;
}

.sidebar{
    width:250px;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    background:#08173a;
    padding:20px;
}

.admin-container{
    margin-left:270px;
    padding:25px;
}

.admin-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:25px;

}

.admin-title{

    font-size:35px;
    font-weight:800;

}

.admin-card{
    
    transition:.3s;
    background:
    linear-gradient(
    180deg,
    #08173a,
    #06102a
    );

    border-radius:25px;

    padding:25px;

    margin-bottom:25px;

    border:1px solid
    rgba(255,255,255,.08);

}

.admin-card:hover{
    transform:translateY(-3px);
}
.input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:#102347;

    color:white;

    outline:none;

}

.label{

    display:block;

    margin-bottom:10px;

    font-weight:600;

}

.save-btn{

    width:100%;

    border:none;

    padding:15px;

    border-radius:15px;

    background:#4cc9ff;

    color:#001321;

    font-weight:700;

    cursor:pointer;

}

.product-list{

    margin-top:20px;

}

.product-item{

    display:flex;

    gap:20px;

    align-items:center;

    background:#102347;

    padding:15px;

    border-radius:20px;

    margin-bottom:15px;

}

.product-thumb{

    width:90px;
    height:90px;

    border-radius:15px;

    overflow:hidden;

    flex-shrink:0;

}

.product-thumb img{

    width:100%;
    height:100%;

    object-fit:cover;

}

.product-info{

    flex:1;

}

.product-info h3{

    margin-bottom:5px;

}

.product-price{

    color:#ff5ab3;

    font-size:20px;

    font-weight:700;

}

.actions{

    display:flex;
    gap:10px;

}

.edit-btn{

    border:none;

    padding:12px 15px;

    border-radius:12px;

    background:#4cc9ff;

    font-weight:700;

    cursor:pointer;

}

.delete-btn{

    border:none;

    padding:12px 15px;

    border-radius:12px;

    background:#ff5a5a;

    color:white;

    font-weight:700;

    cursor:pointer;

}

.logout-btn{
    width:100%;
    margin-top:20px;
    border:none;
    padding:14px;
    border-radius:15px;
    background:#ff5ab3;
    color:#fff;
    font-weight:700;
    cursor:pointer;
}

.loading-card{

    height:100px;

    border-radius:20px;

    margin-bottom:15px;

    background:
    linear-gradient(
    90deg,
    #102347 25%,
    #18356f 50%,
    #102347 75%
    );

    background-size:200% 100%;

    animation:skeleton 1.2s infinite;

}

@keyframes skeleton{

0%{
background-position:200% 0;
}

100%{
background-position:-200% 0;
}

}

#testimoniList{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(280px,1fr));
    gap:15px;
}

.testi-item{
    background:#102347;
    border-radius:20px;
    overflow:hidden;
    padding:15px;
}

.testi-item img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

#editTestiModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
    z-index:9999;
    opacity:0;
    transition:.25s;
}

#editTestiModal.show{
    opacity:1;
}

#editTestiModal .modal-box{
    width:95%;
    max-width:450px;
    background:#08173a;
    padding:20px;
    border-radius:20px;
    transform:scale(.9);
    transition:.25s;
}

#editTestiModal.show .modal-box{
    transform:scale(1);
}

.dashboard-stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:25px;
}

.stat-card{
    background:linear-gradient(
    135deg,
    #102347,
    #08173a
    );

    padding:20px;
    border-radius:20px;

    text-align:center;

    border:1px solid
    rgba(255,255,255,.08);
}

.stat-number{
    font-size:32px;
    font-weight:800;
    color:#4cc9ff;
}

.stat-label{
    color:#aaa;
    margin-top:5px;
}

#editModal,
#editTestiModal{
    display:none;
    position:fixed;
    visibility:hidden;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
    z-index:9999;
    opacity:0;
    transition:.25s;
}

#editModal.show,
#editTestiModal.show{
    display:flex;
    visibility:visible;
    opacity:1;
}

#editModal .modal-box,
#editTestiModal .modal-box{
    width:95%;
    max-width:500px;
    background:#08173a;
    padding:20px;
    border-radius:20px;
    transform:scale(.9);
    transition:.25s;
}

#editModal.show .modal-box,
#editTestiModal.show .modal-box{
    transform:scale(1);
}

.sidebar a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:8px;
    transition:.3s;
    overflow-y:auto;
}

.sidebar a:hover{
    background:#102347;
}

@media(max-width:768px){

.sidebar{
    position:relative;
    width:100%;
    height:auto;
    margin-bottom:20px;
}

.admin-container{
    margin-left:0;
    padding:15px;
}

.dashboard-stats{
    grid-template-columns:1fr;
}

}
</style>

</head>
<body>

<div class="admin-container">

<div class="sidebar">

<h2>YAMZZ ADMIN</h2>

<a href="#dashboard">Dashboard</a>
<a href="#produk">Produk</a>
<a href="#testimoni">Testimoni</a>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<div id="dashboard" class="dashboard-stats">

<div class="stat-card">
    <div
    class="stat-number"
    id="totalProducts">
    0
    </div>

    <div class="stat-label">
    Produk
    </div>
</div>

<div class="stat-card">
    <div
    class="stat-number"
    id="totalTestimonials">
    0
    </div>

    <div class="stat-label">
    Testimoni
    </div>
</div>

<div class="stat-card">
    <div class="stat-number">
    ✓
    </div>

    <div class="stat-label">
    Online
    </div>
</div>

</div>
<!-- Pengaturan Website -->

<div class="admin-card">

<h2>Pengaturan Website</h2>

<br>

<label class="label">
Nama Website
</label>

<input
type="text"
id="siteName"
class="input">

<br><br>

<label class="label">
WhatsApp Admin
</label>

<input
type="text"
id="siteWa"
class="input">

<br><br>

<label class="label">
Link Grup
</label>

<input
type="text"
id="groupLink"
class="input">

<br><br>

<button
class="save-btn"
onclick="saveSettings()">

Simpan Pengaturan

</button>

</div>

<!-- Tambah Produk -->

<div id="produk" class="admin-card">
<h2>Tambah Produk</h2>

<br>

<input
type="text"
id="title"
class="input"
placeholder="Nama Produk">

<br><br>

<textarea
id="description"
class="input"
rows="4"
placeholder="Deskripsi Produk"></textarea>

<br><br>

<input
type="number"
id="price"
class="input"
placeholder="Harga">

<br><br>

<input
type="text"
id="image"
class="input"
placeholder="URL Gambar">

<br><br>

<input
type="number"
id="whatsapp"
class="input"
placeholder="Nomor WhatsApp">

<br><br>

<button
class="save-btn"
onclick="addProduct()">

Tambah Produk

</button>

</div>

<!-- Tambah Testimoni -->
<!-- Kelola Testimoni -->

<div id="testimoni" class="admin-card">
<h2>Kelola Testimoni</h2>

    <br>

    <input
    type="text"
    id="testiTitle"
    class="input"
    placeholder="Judul Testimoni">

    <br><br>

    <input
    type="text"
    id="testiDesc"
    class="input"
    placeholder="Deskripsi">

    <br><br>

    <input
    type="text"
    id="testiImage"
    class="input"
    placeholder="URL Gambar">

    <br><br>

    <button
    class="save-btn"
    onclick="addTestimonial()">

        Tambah Testimoni

    </button>

    <br><br>

    <div id="testimoniList"></div>

</div>
<!-- Daftar Produk -->

<div class="admin-card">

<section class="section"><h2 class="section-title">
    Produk Terbaru
</h2>


<input
type="text"
id="searchInput"
class="search"
placeholder="Masukkan Spek...">

<div id="productList" class="products">

    <div class="loading-card"></div>
    <div class="loading-card"></div>
    <div class="loading-card"></div>

</div>

</section>

</div>

</div>
<div id="editModal">

  <div class="modal-box">

    <h3 style="margin:0 0 15px 0; display:flex; align-items:center; gap:8px;">
  <i class="fa-solid fa-pen-to-square" style="color:#00e5ff;"></i>
  Edit Produk
</h3>
<input id="editTitle" placeholder="Nama Produk"
style="width:100%; margin-bottom:10px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<input id="editDesc" placeholder="Deskripsi"
style="width:100%; margin-bottom:10px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<input type="number" id="editPrice" placeholder="Harga"
style="width:100%; margin-bottom:10px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<input id="editImage" placeholder="URL Gambar"
style="width:100%; margin-bottom:12px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">

<select id="editStatus"
style="width:100%; margin-bottom:12px; padding:10px;
border:none; border-radius:8px;
background:#111; color:#fff; outline:none;">
    <option value="ready">READY</option>
    <option value="sold">SOLD</option>
</select>

<button onclick="saveEdit()"
style="
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ff99,#00e5ff);
color:#000;
font-weight:bold;
cursor:pointer;
margin-bottom:8px;
box-shadow:0 0 10px rgba(0,255,200,0.3);
">
Simpan Perubahan
</button>

<button onclick="closeModal()"
style="
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff3b3b;
color:#fff;
font-weight:bold;
cursor:pointer;
">
Batal
</button>

  </div>

</div>
<div id="editTestiModal">

  <div class="modal-box">

    <h3>Edit Testimoni</h3>

    <input
    id="editTestiTitle"
    class="input"
    placeholder="Judul">

    <br><br>

    <input
    id="editTestiDesc"
    class="input"
    placeholder="Deskripsi">

    <br><br>

    <input
    id="editTestiImage"
    class="input"
    placeholder="URL Gambar">

    <br><br>

    <button
    class="save-btn"
    onclick="saveTestimonialEdit()">

      Simpan Perubahan

    </button>

    <br><br>

    <button
    class="delete-btn"
    style="width:100%;"
    onclick="closeTestimonialModal()">

      Batal

    </button>

  </div>

</div>
<script src="js/jsonbin.js"></script>
<script src="js/admin.js"></script>

</body>
    </html>
